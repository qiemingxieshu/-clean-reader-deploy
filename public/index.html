<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a90d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>纯净阅读 - Clean Reader</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <h1>📖 CLEAN-READER</h1>
      <p class="subtitle">Enter a URL for distraction-free reading</p>
    </header>

    <!-- 输入区域 -->
    <div class="input-section">
      <div class="input-group">
        <input 
          type="url" 
          id="urlInput" 
          placeholder="粘贴网页链接，例如：https://example.com/article"
          autocomplete="off"
        >
        <button id="readBtn" class="btn-primary">开始阅读</button>
      </div>
      <p class="hint">支持任何包含文章的网页链接</p>
    </div>

    <!-- 加载状态 -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>正在提取内容...</p>
    </div>

    <!-- 错误提示 -->
    <div id="error" class="error hidden">
      <p id="errorMessage"></p>
      <button onclick="document.getElementById('error').classList.add('hidden')" class="btn-secondary">关闭</button>
    </div>

    <!-- 阅读区域 -->
    <div id="reader" class="reader hidden">
      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn-icon" id="prevBtn" title="上一页">⬅️</button>
          <select id="chapterSelect" class="chapter-select" title="选择章节">
            <option value="">📑 选择章节</option>
          </select>
          <button class="btn-icon" id="nextBtn" title="下一页">➡️</button>
        </div>
        <div class="toolbar-group">
          <button class="btn-icon" id="themeToggle" title="切换主题">🌙</button>
          <button class="btn-icon" id="fontSizeDown" title="缩小字体">A-</button>
          <button class="btn-icon" id="fontSizeUp" title="放大字体">A+</button>
        </div>
        <button id="backBtn" class="btn-secondary">返回</button>
      </div>

      <!-- 文章信息 -->
      <article class="article">
        <h2 id="articleTitle"></h2>
        <div class="meta">
          <span id="articleByline"></span>
          <span id="articleSite"></span>
          <span id="articleLength"></span>
        </div>
        <div id="articleContent" class="content"></div>
      </article>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
      <!-- Footer removed -->
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
